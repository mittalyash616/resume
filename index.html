<!DOCTYPE html>
<html>
<head>
  <title>Live PDF</title>
  <meta http-equiv="refresh" content="3">
  <style>
    body { margin: 0; }
    iframe { width: 100%; height: 100vh; border: none; }
  </style>
</head>
<body>
  <iframe id="pdf"></iframe>

<script>
setInterval(() => {
  document.getElementById("pdf").src = "maker.pdf?v=" + new Date().getTime();
}, 3000);
</script>
</body>
</html>
